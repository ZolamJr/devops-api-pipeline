name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint du code
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Lancer ESLint
        run: npm run lint

  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: npm test

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Construire l'image Docker
        run: docker build -t devops-api-pipeline .

      - name: Vérifier que le conteneur démarre
        run: |
          docker run -d -p 3000:3000 --name test-api devops-api-pipeline
          sleep 3
          curl --fail http://localhost:3000/health
          docker stop test-api
